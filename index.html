<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        .card {
            background: white; padding: 40px; border-radius: 20px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 320px; width: 85%; z-index: 10;
        }
        h1 { color: #e60073; font-size: 26px; }
        button {
            border: none; padding: 12px 25px; margin: 8px;
            font-size: 16px; border-radius: 25px; cursor: pointer;
            font-weight: bold; width: 200px; transition: 0.3s;
        }
        #yes { background: #ff4d88; color: white; }
        #forever { background: #d63384; color: white; }
        #no { background: #ccc; position: absolute; width: auto; z-index: 100; }
        .heart {
            position: fixed; bottom: -20px; font-size: 20px;
            animation: float 5s linear infinite; color: #ff3366;
            pointer-events: none; z-index: 1;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<audio id="proposalMusic">
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<div class="card" id="mainCard">
    <h1>My Dear Kusuma ❤️</h1>

   <p>From the moment you when i saw you,<br>
       everything became beautiful🥰.</p>
    
    <p>Will you be my Better‑Half? 💍</p>
    <div class="buttons">
        <button id="yes" onclick="handleResponse('Standard')">Yes 🥰</button>
        <button id="forever" onclick="handleResponse('Forever')">Yes, Forever 💖</button>
    </div>
</div>

<button id="no">No 🙈</button>

<script>
    const noBtn = document.getElementById("no");
    const mainCard = document.getElementById("mainCard");
    const music = document.getElementById("proposalMusic");

    noBtn.style.top = "85%"; noBtn.style.left = "50%";
    noBtn.style.transform = "translateX(-50%)";

    function moveButton() {
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
        noBtn.style.left = `${x}px`; noBtn.style.top = `${y}px`;
    }
    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveButton(); });

    function createHeart(isSpecial = false) {
        const heart = document.createElement("div");
        heart.innerHTML = isSpecial ? "💘" : "💖";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
    setInterval(() => createHeart(false), 300);

    function handleResponse(type) {
        // Play Music
        music.play();

        // Send Email (Replace with your email!)
        const email = "dhineshdasaraju910@gmail.com";
        fetch(`https://formsubmit.co/ajax/${email}`, {
            method: "POST",
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: `Kusuma said: ${type}!` })
        });

        // Update UI
        noBtn.style.display = "none";
        if (type === standard) {
            mainCard.innerHTML = `<h1>Yay! 🥰❤️</h1><p>You've made me the happiest person bangaram❣️!</p>`;
        } else {
            for(let i=0; i<30; i++) { setTimeout(() => createHeart(true), i * 100); }
            document.body.style.background = "linear-gradient(135deg, #ff0055, #ff9a9e)";
            mainCard.innerHTML = `<h1>Forever & Always! ♾️❤️</h1><p>I promise to love you always & forever, bangaram ♥️❣️.</p>`;
        }

        // Timeout Reload (6 seconds)
        setTimeout(() => {
            location.reload();
        }, 5000);
    }
</script>
</body>
</html>
