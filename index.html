<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            background-color: #fdf2f2; 
        }
        h1 { color: #d63384; }
    </style>
</head>
<body onload="askQuestion()">

    <h1>Checking for a response...</h1>

    <script>
        function askQuestion() {
            setTimeout(() => {
                const response = confirm("Will you be my better-half?");
                if (response) {
                    alert("I am the happiest person alive! ❤️");
                } else {
                    alert("Oh no! But I'll still be here waiting. 😊");
                }
            }, 500); // Pops up after 0.5 seconds
        }
    </script>
</body>
</html>
